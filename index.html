<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Torah Daily | תורה יומי</title>
  <meta name="description" content="Daily Torah readings with Hebrew, English, audio, and commentary" />
  <meta name="theme-color" content="#1a1209" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Torah Daily" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Frank+Ruhl+Libre:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:       #1a1209;
      --parchment: #f5f0e4;
      --aged:      #e8dfc8;
      --gold:      #b8922a;
      --gold-light:#d4a93a;
      --rust:      #8b3a1a;
      --olive:     #4a5c2e;
      --muted:     #6b5d45;
      --panel:     #faf7f0;
      --border:    #d4c9a8;
      --shadow:    rgba(26,18,9,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--ink);
      color: var(--parchment);
      padding: env(safe-area-inset-top, 0) 0 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px var(--shadow);
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
    }
    .header-logo {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.7rem;
      font-weight: 300;
      color: var(--gold-light);
      letter-spacing: 0.01em;
      line-height: 1;
    }
    .header-divider { width: 1px; height: 28px; background: #3a2e1e; }
    .header-title {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a89478;
      line-height: 1.3;
    }
    .header-title span { display: block; color: var(--parchment); font-size: 0.82rem; letter-spacing: 0.06em; }
    @media (max-width: 420px) { .header-title { display: none; } }

    /* ── PARASHA SELECTOR ── */
    .parasha-bar {
      background: #241c0f;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .parasha-bar::-webkit-scrollbar { display: none; }
    .parasha-chip {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8a7458;
      background: transparent;
      border: 1px solid #3a2e1e;
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .parasha-chip:hover { color: var(--gold-light); border-color: var(--gold); }
    .parasha-chip.active { background: var(--gold); border-color: var(--gold); color: var(--ink); font-weight: 500; }
    .parasha-chip.today-parasha { border-color: var(--rust); }
    .parasha-chip.today-parasha::after { content: '·'; margin-left: 5px; color: var(--rust); }
    .today-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--rust);
      color: var(--parchment);
      border: 1px solid var(--rust);
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      flex-shrink: 0;
      font-weight: 500;
    }
    .today-btn:hover { background: #a04020; border-color: #a04020; }
    .bar-divider { width: 1px; height: 18px; background: #3a2e1e; flex-shrink: 0; }

    /* ── MAIN LAYOUT ── */
    main { max-width: 860px; margin: 0 auto; padding: 28px 16px 80px; }

    /* ── PARASHA HEADING ── */
    .parasha-header {
      text-align: center;
      margin-bottom: 28px;
      padding: 28px 20px 24px;
      background: white;
      border-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .parasha-header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
    }
    .parasha-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .parasha-name-he {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      direction: rtl;
      margin-bottom: 4px;
    }
    .parasha-name-en {
      font-family: 'EB Garamond', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .parasha-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── AUDIO PLAYER ── */
    .audio-panel {
      background: var(--ink);
      color: var(--parchment);
      border-radius: 4px;
      padding: 18px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .audio-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.12s;
    }
    .audio-btn:hover { background: var(--gold-light); transform: scale(1.05); }
    .audio-btn svg { width: 18px; height: 18px; fill: var(--ink); }
    .audio-info { flex: 1; min-width: 0; }
    .audio-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a7458;
      margin-bottom: 2px;
    }
    .audio-title {
      font-size: 0.95rem;
      color: var(--parchment);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .audio-lang-toggle {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .lang-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 3px;
      border: 1px solid #3a2e1e;
      background: transparent;
      color: #8a7458;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--ink); }
    .audio-progress {
      width: 100%;
      accent-color: var(--gold);
      cursor: pointer;
      margin-top: 8px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
      gap: 0;
    }
    .tab-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--rust); border-bottom-color: var(--rust); font-weight: 500; }

    /* ── ALIYAH SELECTOR ── */
    .aliyah-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .aliyah-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: white;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .aliyah-btn:hover { border-color: var(--gold); color: var(--gold); }
    .aliyah-btn.active { background: var(--rust); border-color: var(--rust); color: white; }

    /* ── PASSAGE TEXT ── */
    .passage {
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 1px 8px var(--shadow);
    }
    .verse {
      display: grid;
      grid-template-columns: 28px 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid #f0e8d5;
    }
    .verse:last-child { border-bottom: none; }
    .verse-num {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      color: var(--gold);
      font-weight: 500;
      padding: 14px 0 14px 12px;
      display: flex;
      align-items: flex-start;
      padding-top: 16px;
    }
    .verse-he {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.85;
      direction: rtl;
      text-align: right;
      padding: 12px 14px 12px 10px;
      border-right: 1px solid #f0e8d5;
      color: var(--ink);
    }
    .verse-en {
      font-family: 'EB Garamond', serif;
      font-size: 1.0rem;
      line-height: 1.75;
      padding: 12px 14px 12px 10px;
      color: #2a2015;
    }

    /* ── COMMENTARY ── */
    .commentary-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 8px var(--shadow);
    }
    .commentary-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .commentary-icon {
      width: 32px; height: 32px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .commentary-title {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .commentary-text {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #2a2015;
    }
    .commentary-text p { margin-bottom: 1em; }
    .commentary-text p:last-child { margin-bottom: 0; }
    .commentary-source {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .generate-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      background: var(--rust);
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 12px;
    }
    .generate-btn:hover { background: #a04020; }
    .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .generate-btn svg { width: 14px; height: 14px; fill: white; }

    /* ── LOADING / SKELETON ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      padding: 48px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .skeleton { animation: pulse 1.4s ease-in-out infinite; }
    .skeleton-line {
      height: 14px; border-radius: 3px;
      background: var(--aged); margin-bottom: 10px;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

    /* ── ORNAMENT ── */
    .ornament {
      text-align: center;
      color: var(--gold);
      font-size: 1.2rem;
      letter-spacing: 0.5em;
      margin: 28px 0;
      opacity: 0.6;
    }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--ink);
      color: var(--parchment);
      padding: 14px 20px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0));
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 200;
      box-shadow: 0 -4px 20px var(--shadow);
    }
    #install-banner.hidden { display: none !important; }
    .install-text {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      line-height: 1.4;
    }
    .install-text strong { color: var(--gold-light); }
    .install-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 16px;
      background: var(--gold);
      color: var(--ink);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-weight: 500;
      flex-shrink: 0;
    }
    .dismiss-btn {
      background: transparent;
      border: none;
      color: #5a4a35;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px;
      flex-shrink: 0;
    }

    /* ── ERROR ── */
    .error-box {
      background: #fdf3f0;
      border: 1px solid #e8c4b8;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      color: var(--rust);
    }

    /* ── MODE TOGGLE ── */
    .mode-toggle {
      display: flex;
      margin-left: auto;
      gap: 4px;
      background: #0e0c06;
      border-radius: 20px;
      padding: 3px;
    }
    .mode-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border: none;
      border-radius: 20px;
      background: transparent;
      color: #6b5d45;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active { background: var(--gold); color: var(--ink); font-weight: 500; }
    .mode-btn:not(.active):hover { color: var(--gold-light); }

    /* ── TANAKH BROWSER ── */
    .tanakh-section-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .tanakh-section-label:first-child { margin-top: 0; }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .book-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .book-card:hover { border-color: var(--gold); box-shadow: 0 2px 8px var(--shadow); transform: translateY(-1px); }
    .book-card-he {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--gold);
      direction: rtl;
      text-align: right;
      margin-bottom: 4px;
    }
    .book-card-en {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 6px;
      margin-bottom: 24px;
    }
    .chapter-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      padding: 9px 4px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: white;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .chapter-btn:hover { background: var(--gold); border-color: var(--gold); color: var(--ink); }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 18px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--ink); }
    .tanakh-header {
      text-align: center;
      margin-bottom: 24px;
      padding: 20px;
      background: white;
      border-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .tanakh-header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--olive), var(--gold), var(--olive));
    }

    /* ── HAFTORAH ── */
    .haftorah-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--olive);
      margin-bottom: 6px;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .verse {
        grid-template-columns: 20px 1fr;
        grid-template-rows: auto auto;
      }
      .verse-num { grid-row: 1; grid-column: 1; padding: 10px 0 4px 10px; }
      .verse-he { grid-row: 1; grid-column: 2; padding: 10px 12px 6px 8px; border-right: none; border-bottom: 1px solid #f0e8d5; font-size: 0.97rem; }
      .verse-en { grid-row: 2; grid-column: 1 / span 2; padding: 6px 12px 10px 12px; font-size: 0.93rem; }
      .parasha-name-he { font-size: 1.9rem; }
      main { padding: 16px 10px 80px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo">תורה</div>
    <div class="header-divider"></div>
    <div class="header-title">
      <span>Torah Daily</span>
      Hebrew · English · Commentary
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-parasha" onclick="setMode('parasha')">Parasha</button>
      <button class="mode-btn" id="mode-tanakh" onclick="setMode('tanakh')">Tanakh</button>
    </div>
  </div>
  <div class="parasha-bar" id="parashot-bar">
    <div class="loading" style="padding:8px 0; color:#8a7458; font-size:0.7rem;">Loading parashot…</div>
  </div>
</header>

<main>
  <div id="app-content">
    <div class="loading"><div class="spinner"></div>Loading Torah…</div>
  </div>
</main>

<!-- Install Banner -->
<div id="install-banner" class="hidden">
  <div class="install-text"><strong>Install Torah Daily</strong><br>Add to your home screen for offline access</div>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="dismiss-btn" id="dismiss-btn">✕</button>
</div>

<script>
// ── DATA: All 54 Parashot ──────────────────────────────────────────────────
const PARASHOT = [
  { id: 'Bereshit',     he: 'בְּרֵאשִׁית',    en: 'Bereshit',     book: 'Genesis',     ref: 'Genesis 1:1-6:8',   aliyot: ['Genesis 1:1-2:3','Genesis 2:4-2:19','Genesis 2:20-3:21','Genesis 3:22-4:26','Genesis 5:1-6:8'] },

// ── SEFARIA API ────────────────────────────────────────────────────────────
async function fetchVerses(ref) {
  const encoded = encodeURIComponent(ref);
  const url = `https://www.sefaria.org/api/texts/${encoded}?context=0&commentary=0&pad=0`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sefaria API error: ${res.status}`);
  return res.json();
}

function parseVerses(data) {
  // Sefaria returns 2D arrays for multi-chapter passages — flatten to 1D
  const flat = arr => (arr.length && Array.isArray(arr[0])) ? arr.flat() : arr;
  const he = flat(data.he || []);
  const en = flat(Array.isArray(data.text) ? data.text : (data.text ? [data.text] : []));
  const maxLen = Math.max(he.length, en.length);
  const startVerse = data.sections ? data.sections[data.sections.length - 1] : 1;
  const verses = [];
  for (let i = 0; i < maxLen; i++) {
    verses.push({
      num: startVerse + i,
      he: (Array.isArray(he[i]) ? he[i].join(' ') : (he[i] || '')).replace(/<[^>]+>/g, '').trim(),
      en: (Array.isArray(en[i]) ? en[i].join(' ') : (en[i] || '')).replace(/<[^>]+>/g, '').trim(),
    });
  }
  return verses.filter(v => v.he || v.en);
}

// ── CLAUDE COMMENTARY ─────────────────────────────────────────────────────
async function generateCommentary(parasha, aliyahRef, verseText) {
  const prompt = `You are a knowledgeable Torah scholar and educator. Provide a thoughtful, accessible commentary on this Torah passage.

Parasha: ${parasha.en} (${parasha.he})
Passage: ${aliyahRef}
Text: ${verseText.slice(0, 800)}

Write 3-4 paragraphs covering:
1. The immediate context and what is happening in this passage
2. A key theme or lesson from the text, drawing on classical commentators (Rashi, Ramban, etc.) where relevant
3. A meaningful insight for modern readers — something personally applicable
4. A short reflection question to carry through the day

Keep the tone warm, scholarly but accessible. Do not use headers or bullet points — flowing prose only.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) throw new Error('Commentary API error');
  const data = await res.json();
  return data.content.map(b => b.text || '').join('');
}

// ── AUDIO ─────────────────────────────────────────────────────────────────
function stopAudio() {
  window.speechSynthesis.cancel();
  state.speaking = false;
  updatePlayBtn(false);
}

function updatePlayBtn(playing) {
  const btn = document.getElementById('play-btn');
  if (!btn) return;
  btn.innerHTML = playing
    ? `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
    : `<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>`;
}

function readAloud() {
  if (state.speaking) { stopAudio(); return; }
  const lang = state.audioLang;
  const text = state.verses.map(v => lang === 'he' ? v.he : v.en).filter(Boolean).join(' ');
  if (!text) return;
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang === 'he' ? 'he-IL' : 'en-US';
  utterance.rate = lang === 'he' ? 0.85 : 0.95;
  utterance.onstart = () => { state.speaking = true; updatePlayBtn(true); };
  utterance.onend = () => { state.speaking = false; updatePlayBtn(false); };
  utterance.onerror = () => { state.speaking = false; updatePlayBtn(false); };
  window.speechSynthesis.speak(utterance);
  state.utterance = utterance;
}

    const data = await fetchVerses(ref);

  return TANAKH_SECTIONS.map(section => `
    <div class="tanakh-section-label">${section.label}</div>
    <div class="book-grid">
      ${section.books.map(book => `
        <div class="book-card" onclick="selectTanakhBook('${book.id}')">
          <div class="book-card-he">${book.he}</div>
          <div class="book-card-en">${book.en}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
async function loadPassage() {
  stopAudio();
  state.loading = true;
  state.verses = [];
  state.commentary = '';
  renderApp();

  const p = PARASHOT[state.parashaIdx];
  const ref = p.aliyot[state.aliyahIdx] || p.ref;

  // Try local pre-downloaded data first (works offline)
  try {
    const res = await fetch(`data/${p.id}.json`);
    if (res.ok) {
      const local = await res.json();
      const verses = local.aliyot?.[state.aliyahIdx]?.verses;
      if (verses && verses.length > 0) {
        state.verses = verses;
        state.loading = false;
        renderApp();
        return;
      }
    }
  } catch (_) { /* no local file — fall through to API */ }

  // Fall back to live Sefaria API
  try {
    const data = await fetchVerses(ref);
    state.verses = parseVerses(data);
  } catch (e) {
    console.error(e);
    state.verses = [];
  }
  state.loading = false;
  renderApp();
}

async function loadCommentary(regenerate = false) {
  if (state.loading) return;
  state.loading = true;
  state.tab = 'commentary';
  renderApp();

  const p = PARASHOT[state.parashaIdx];
  const ref = p.aliyot[state.aliyahIdx] || p.ref;
  const sampleText = state.verses.slice(0, 5).map(v => `${v.num}. ${v.en}`).join(' ');

  try {
    state.commentary = await generateCommentary(p, ref, sampleText);
  } catch (e) {
    console.error(e);
    state.commentary = 'Commentary could not be generated at this time. Please check your connection and try again.';
  }
  state.loading = false;
  renderApp();
}

function selectParasha(idx) {
  state.parashaIdx = idx;
  state.aliyahIdx = 0;
  state.haftorahVerses = [];
  state.haftorahLoading = false;
  renderParashotBar();
  loadPassage();
  setTimeout(() => {
    const chips = document.querySelectorAll('.parasha-chip');
    if (chips[idx]) chips[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, 50);
}

function selectAliyah(idx) {
  state.aliyahIdx = idx;
  loadPassage();
}

function setTab(tab) {
  state.tab = tab;
  if (tab === 'haftorah' && !state.haftorahVerses.length && !state.haftorahLoading) {
    loadHaftorah();
    return;
  }
  renderApp();
}

function setAudioLang(lang) {
  stopAudio();
  state.audioLang = lang;
  renderApp();
}

// ── INIT ───────────────────────────────────────────────────────────────────
function getCurrentParasha() {
  // Anchored to Bereshit 5785 = Oct 26, 2024 (Shabbat Bereshit)
  const anchor = new Date(2024, 9, 26);
  const now = new Date();
  const weeks = Math.floor((now - anchor) / (7 * 24 * 60 * 60 * 1000));
  return ((weeks % 54) + 54) % 54;
}

function goToToday() {
  const idx = getCurrentParasha();
  selectParasha(idx);
}

renderParashotBar();
state.parashaIdx = getCurrentParasha();
loadPassage();
renderParashotBar(); // re-render with correct active

// ── PWA INSTALL ────────────────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.remove('hidden');
});

document.getElementById('install-btn')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.add('hidden');
});

document.getElementById('dismiss-btn')?.addEventListener('click', () => {
  document.getElementById('install-banner').classList.add('hidden');
});

// ── SERVICE WORKER ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}
</script>
